name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pymavlink flask flask-socketio opencv-python pyinstaller

    - name: Download mediamtx for Windows
      shell: powershell
      run: |
        $url = "https://github.com/bluenviron/mediamtx/releases/latest/download/mediamtx_v1.9.1_windows_amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile mediamtx.zip
        Expand-Archive mediamtx.zip -DestinationPath mediamtx_win -Force
        Copy-Item mediamtx_win\mediamtx.exe .\mediamtx.exe
      continue-on-error: true

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --name "FPV-GroundStation" --add-data "static;static" --add-data "mediamtx.yml;." --hidden-import=engineio.async_drivers.threading --hidden-import=flask_socketio --hidden-import=socketio --hidden-import=pymavlink --hidden-import=pymavlink.dialects --hidden-import=pymavlink.dialects.v20 --hidden-import=pymavlink.dialects.v20.ardupilotmega --collect-all flask_socketio --collect-all pymavlink --collect-all cv2 app.py

    - name: Copy mediamtx.exe to dist
      shell: powershell
      run: |
        if (Test-Path "mediamtx.exe") {
          Copy-Item mediamtx.exe dist\mediamtx.exe
        }
      continue-on-error: true

    - name: Create launcher batch file
      shell: powershell
      run: |
        $bat = '@echo off
title FPV Ground Station
cd /d "%~dp0"

echo ============================================
echo  FPV Ground Station - Antara
echo ============================================
echo.

REM Add firewall rules (run once)
netsh advfirewall firewall add rule name="FPV-MAVLink" protocol=UDP dir=in localport=14550 action=allow >nul 2>&1
netsh advfirewall firewall add rule name="FPV-WebRTC" protocol=UDP dir=in localport=8889 action=allow >nul 2>&1
netsh advfirewall firewall add rule name="FPV-HTTP" protocol=TCP dir=in localport=8086 action=allow >nul 2>&1

REM Start mediamtx video proxy
if exist mediamtx.exe (
  echo [1/2] Starting video proxy (mediamtx)...
  start "mediamtx" /min mediamtx.exe mediamtx.yml
  timeout /t 3 /nobreak >nul
) else (
  echo [!] mediamtx.exe not found - video will not work
)

REM Start Flask app
echo [2/2] Starting FPV Ground Station...
echo.
echo MAVLink: UDP port 14550
echo Video:   http://localhost:8889
echo Web UI:  http://localhost:8086
echo.

REM Open browser after short delay
start "" cmd /c "timeout /t 3 /nobreak >nul && start http://localhost:8086"

FPV-GroundStation.exe

echo.
echo App stopped. Press any key to exit.
pause >nul'
        $bat | Out-File -FilePath dist\START.bat -Encoding ASCII

    - name: Package release
      shell: powershell
      run: |
        Copy-Item mediamtx.yml dist\mediamtx.yml
        Compress-Archive -Path dist\* -DestinationPath FPV-GroundStation-Windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPV-GroundStation-Windows
        path: FPV-GroundStation-Windows.zip
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: FPV Ground Station v1.0.${{ github.run_number }}
        files: FPV-GroundStation-Windows.zip
        body: |
          ## FPV Ground Station for Windows

          ### Installation
          1. Download and extract `FPV-GroundStation-Windows.zip`
          2. Double-click `START.bat`
          3. Browser opens automatically at http://localhost:8086

          ### Requirements
          - Windows 10/11 x64
          - No Python needed
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
