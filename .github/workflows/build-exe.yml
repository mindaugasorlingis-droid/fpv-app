name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pymavlink flask flask-socketio opencv-python pyserial pyinstaller numpy websocket-client

    - name: Build EXE
      run: >
        pyinstaller --onefile --name "FPV-GroundStation"
        --add-data "static;static"
        --add-data "mediamtx.yml;."
        --add-data "backbone.onnx;."
        --add-data "neckhead.onnx;."
        --hidden-import=engineio.async_drivers.threading
        --hidden-import=flask_socketio
        --hidden-import=socketio
        --hidden-import=pymavlink
        --hidden-import=pymavlink.dialects
        --hidden-import=pymavlink.dialects.v20
        --hidden-import=pymavlink.dialects.v20.ardupilotmega
        --hidden-import=websocket
        --hidden-import=websocket._core
        --hidden-import=websocket._abnf
        --hidden-import=websocket._http
        --hidden-import=websocket._utils
        --collect-all flask_socketio
        --collect-all pymavlink
        --collect-all cv2
        --collect-all websocket
        app.py

    - name: Create package
      shell: powershell
      run: |
        $bat = '@echo off' + "`r`n"
        $bat += 'title FPV Ground Station' + "`r`n"
        $bat += 'cd /d "%~dp0"' + "`r`n"
        $bat += 'netsh advfirewall firewall add rule name="FPV-MAVLink" protocol=UDP dir=in localport=19856 action=allow >nul 2>&1' + "`r`n"
        $bat += 'netsh advfirewall firewall add rule name="FPV-HTTP" protocol=TCP dir=in localport=8086 action=allow >nul 2>&1' + "`r`n"
        $bat += 'start "" cmd /c "timeout /t 3 /nobreak >nul && start http://localhost:8086"' + "`r`n"
        $bat += 'FPV-GroundStation.exe' + "`r`n"
        $bat += 'pause' + "`r`n"
        Set-Content -Path dist\START.bat -Value $bat -Encoding ASCII
        Copy-Item mediamtx.yml dist\mediamtx.yml -ErrorAction SilentlyContinue
        Copy-Item backbone.onnx dist\backbone.onnx -ErrorAction SilentlyContinue
        Copy-Item neckhead.onnx dist\neckhead.onnx -ErrorAction SilentlyContinue
        Compress-Archive -Path dist\* -DestinationPath FPV-GroundStation-Windows.zip

    - name: Verify ZIP exists
      shell: powershell
      run: |
        if (!(Test-Path "FPV-GroundStation-Windows.zip")) {
          Write-Error "ZIP file not found — build failed!"
          exit 1
        }
        $size = (Get-Item "FPV-GroundStation-Windows.zip").Length
        Write-Host "ZIP size: $([math]::Round($size/1MB, 1)) MB"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPV-GroundStation-Windows
        path: FPV-GroundStation-Windows.zip
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: FPV Ground Station v1.0.${{ github.run_number }}
        files: FPV-GroundStation-Windows.zip
        fail_on_unmatched_files: true
        body: |
          ## FPV Ground Station for Windows
          1. Extract ZIP
          2. Run START.bat (as Administrator)
          3. Browser opens at http://localhost:8086
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
